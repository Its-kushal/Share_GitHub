<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrical Bill Management</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background-color: lightgreen;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 70px;
            border-bottom: 2px solid black;
        }

        .required {
            color: red;
        }

        .footer {
            background-color: lightgreen;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: auto;
            width: 100%;
            height: 50px;
            border-top: 2px solid black;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Electrical Bill Management</h1>
    </div>
    <form action="home.html" method="post">
        <section class="user-details">
            <label>User Details</label>
            <hr>
            <label for="title">Title: </label>
            <select id="title">
                <option value="" disabled selected>Select title</option>
                <option value="mr">Mr.</option>
                <option value="mrs">Mrs.</option>
                <option value="ms">Ms.</option>
                <option value="er">Er.</option>
                <option value="dr">Dr.</option>
            </select>
            <label for="name">Name<span class="required">*</span>: </label>
            <input type="text" id="name">
            <label for="email">Email Id<span class="required">*</span>: </label>
            <input type="email" id="email">
            <label for="mobile">Mobile<span class="required">*</span>: </label>
            <input type="text" id="mobile">
            </form>
        </section>
        <section class="login-details">
            <label>Login Details</label>
            <hr>
            <label for="username">Username<span class="required">*</span>: </label>
            <input type="text" id="username">
            <label for="username">Password<span class="required">*</span>: </label>
            <input type="password" id="password">
            <label for="username">Confirm Password<span class="required">*</span>: </label>
            <input type="password" id="password">
        </section>
    </form>
    <button type="button">Reset</button>
    <button type="button">Register</button>
    <div class="footer">
        <span>&copy;2026</span>
        <span>All rights reserved.</span>
    </div>
</body>

</html>
